name: PR title

# Releases are driven by the squash-merge commit subject, which GitHub seeds from
# the PR title. The release pipeline (.github/workflows/release.yml, "Detect
# release type") only builds and deploys a new image when that subject is a
# Conventional Commit of a releasable type — feat (minor), feat! (major),
# fix/perf/revert/refactor (patch). A non-conventional title is treated as
# non-releasable, so the PR merges but never publishes an image or deploys.
#
# Enforce Conventional Commits on the PR title so changes that should ship
# actually trigger a release instead of silently no-op'ing.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Mirror the types the release detector recognises. feat/fix/perf/
          # revert/refactor are releasable; chore/docs/style/test/ci/build are
          # valid Conventional Commits but intentionally non-releasable.
          types: |
            feat
            fix
            perf
            revert
            refactor
            chore
            docs
            style
            test
            ci
            build
          requireScope: false
