name: Deploy — homelab

# Runs on the self-hosted runner alongside the docker host. Fires after the
# Release workflow succeeds on main, then reconciles the compose stack from the
# *checked-out repo* — git is the source of truth for compose.yml + infra/ —
# while reading secrets from the host-local .env. This closes the drift gap
# where a compose change (new service / new env wiring) merged but never reached
# production because the host's hand-maintained compose.yml was stale.
# Replaces Watchtower — deploys are observable in the Actions log.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-homelab-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Host-local .env holds the secrets (BETTER_AUTH_SECRET, admin creds, event
  # details) and is NEVER committed. compose.yml + infra/ come from the repo
  # checkout. The compose top-level `name:` pins the project (and therefore the
  # named volumes / container names) so running from the runner workspace
  # reconciles the exact same stack as before.
  ENV_FILE: /opt/docker/birthday-invitation/.env

jobs:
  deploy:
    name: Pull & reconcile
    runs-on: [self-hosted]
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Check out repo (compose.yml + infra are the source of truth)
        uses: actions/checkout@v4

      - name: Verify required secrets exist in host .env
        # Fail loudly BEFORE pulling if the host .env is missing a var the app
        # needs. Catches the "new release needs a new env var" trap that would
        # otherwise surface only as a runtime crash-loop after the image swap.
        run: |
          set -euo pipefail
          if [ ! -r "$ENV_FILE" ]; then
            echo "::error::Host env file $ENV_FILE not found or unreadable."
            exit 1
          fi
          required="DOMAIN BIRTHDAY_PERSON ADMIN_EMAIL ADMIN_PASSWORD BETTER_AUTH_SECRET"
          missing=""
          for k in $required; do
            grep -qE "^${k}=.+" "$ENV_FILE" || missing="$missing $k"
          done
          if [ -n "$missing" ]; then
            echo "::error::$ENV_FILE is missing required var(s):$missing — see repo .env.example, add them, then re-run."
            exit 1
          fi
          echo "All required env vars present."

      # Self-hosted runners share the deploy user's ~/.docker/config.json. An
      # expired ghcr.io `ghs_` token cached by another repo's CI makes Docker
      # send it for our pull and get `denied` instead of falling back to
      # anonymous. Our image is public, so clear any stale credential first.
      - name: Clear stale GHCR credentials
        run: docker logout ghcr.io || true

      - name: Pull latest image
        run: docker compose --env-file "$ENV_FILE" pull birthday-invitation

      - name: Reconcile stack
        run: docker compose --env-file "$ENV_FILE" up -d --remove-orphans

      - name: Show status
        run: docker compose --env-file "$ENV_FILE" ps

      - name: Wait for backend to become ready
        # `up -d` returns as soon as the container starts, not when the app is
        # serving. Poll the backend health endpoint (~2 min) so a boot failure
        # turns the deploy red instead of silently green.
        run: |
          set -euo pipefail
          for i in $(seq 1 24); do
            if docker exec birthday-invitation wget -qO- http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "[$i/24] backend ready"; exit 0
            fi
            echo "[$i/24] backend not ready yet"; sleep 5
          done
          echo "Timed out waiting for backend readiness"
          docker logs --tail=200 birthday-invitation || true
          exit 1

      - name: Prune dangling images
        if: success()
        run: docker image prune -f
