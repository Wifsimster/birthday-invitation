name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (typecheck + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test:run

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Validates the runtime image — including the better-sqlite3 native
      # compile on Alpine — on every PR, not just at release time.
      - run: docker build -t birthday-invitation:ci .
